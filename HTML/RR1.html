<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve60</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #3ed80b;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #97e314;
            color: rgb(18, 29, 3);
            padding: 10px 0;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
        }
        h1 {
            color: #091000;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-size: 1.1em;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .confirmation {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Reserve60</h1>
    <p>"Great Meals, Just a Reservation Away."</p>
</header>

<div class="container">
    <h2>Make a Reservation</h2>
    <form id="reservationForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="form-group">
            <label for="date">Reservation Date</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="time">Reservation Time</label>
            <select id="time" name="time" required>
                <option value="9:00">9:00 AM</option>
                <option value="12:00">12:00 AM</option>
                <option value="13:00">1:00 PM</option>
                <option value="18:00">6:00 PM</option>
                <option value="19:00">7:00 PM</option>
                <option value="20:00">8:00 PM</option>
                <option value="21:00">9:00 PM</option>
                <option value="22:00">10:00 PM</option>
            </select>
        </div>
        <div class="form-group">
            <label for="guests">Number of Guests</label>
            <select id="guests" name="guests" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
        </div>
        <div class="form-group">
            <label for="specialRequest">Special Requests</label>
            <textarea id="specialRequest" name="specialRequest" rows="3" placeholder="Any special requests?"></textarea>
        </div>
        <button type="submit">Confirm Reservation</button>
    </form>

    <div id="confirmationMessage" class="confirmation">
        <p><strong>Reservation Confirmed!</strong>"Hope you Enjoy."</p>
    </div>
</div>

<script>
    document.getElementById('reservationForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent form submission for demo purpose

        // Retrieve form data
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const guests = document.getElementById('guests').value;
        const specialRequest = document.getElementById('specialRequest').value;

        // Display confirmation message
        const confirmationMessage = document.getElementById('confirmationMessage');
        confirmationMessage.style.display = 'block';

        // Optionally, you could send the reservation data to a back-end service here (e.g., via AJAX).

        // Reset form
        document.getElementById('reservationForm').reset();
    });
</script>

</body>
</html>
